apiVersion: apps/v1
kind: Deployment
metadata:
  name: rfthz-app
  namespace: rfthz-app
  labels:
    app: rfthz-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rfthz-app
  template:
    metadata:
      labels:
        app: rfthz-app
    spec:
      containers:
        - name: rfthz-app
          image: rfthz-app-argocd:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: rfthz-app-config

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
